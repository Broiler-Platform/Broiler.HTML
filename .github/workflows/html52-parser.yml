name: HTML 5.2 suite

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  html52:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5
        with:
          submodules: recursive

      - name: Verify Broiler.Graphics submodule
        timeout-minutes: 2
        run: |
          git submodule status --recursive
          test -f Broiler.Graphics/Broiler.Graphics/Broiler.Graphics.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        timeout-minutes: 5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        timeout-minutes: 5
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        timeout-minutes: 5
        run: npm ci

      - name: Validate HTML 5.2 manifest
        timeout-minutes: 2
        run: npm run html52:validate

      - name: Check HTML 5.2 coverage closure
        timeout-minutes: 2
        run: npm run html52:coverage -- --output "${RUNNER_TEMP}/html52-coverage" --fail-on-uncovered

      - name: Check HTML 5.2 compliance dashboard
        timeout-minutes: 2
        run: npm run html52:dashboard:check

      - name: Run HTML 5.2 PR smoke suite
        if: github.event_name != 'schedule'
        timeout-minutes: 20
        run: npm run html52:smoke -- --output "${RUNNER_TEMP}/html52-smoke"

      - name: Run full HTML 5.2 suite
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 35
        run: npm run html52:run -- --output "${RUNNER_TEMP}/html52-full"

      - name: Run HTML 5.2 repeatability check
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        timeout-minutes: 45
        run: npm run html52:repeat -- --output "${RUNNER_TEMP}/html52-repeat"

      - name: Add HTML 5.2 summary to workflow summary
        if: always()
        timeout-minutes: 2
        run: |
          for directory in "${RUNNER_TEMP}/html52-coverage" "${RUNNER_TEMP}/html52-smoke" "${RUNNER_TEMP}/html52-full" "${RUNNER_TEMP}/html52-repeat"; do
            if [ -f "${directory}/summary.md" ]; then
              cat "${directory}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
              echo >> "${GITHUB_STEP_SUMMARY}"
            fi
            if [ -f "${directory}/coverage.md" ]; then
              cat "${directory}/coverage.md" >> "${GITHUB_STEP_SUMMARY}"
              echo >> "${GITHUB_STEP_SUMMARY}"
            fi
          done

      - name: Upload HTML 5.2 suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        with:
          name: html52-suite-artifacts
          path: |
            ${{ runner.temp }}/html52-coverage
            ${{ runner.temp }}/html52-smoke
            ${{ runner.temp }}/html52-full
            ${{ runner.temp }}/html52-repeat
          if-no-files-found: warn
