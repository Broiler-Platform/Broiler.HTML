name: Non-JS WPT compliance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/wpt-non-js.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/wpt/**'
      - 'Source/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/wpt-non-js.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/wpt/**'
      - 'Source/**'

permissions:
  contents: read

jobs:
  wpt-non-js:
    runs-on: ubuntu-latest
    # Keep the full workflow bounded while leaving enough room for a normal
    # WPT checkout, build, and focused 20-case render/diff run.
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        timeout-minutes: 5
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        timeout-minutes: 5
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Install Playwright Chromium
        timeout-minutes: 15
        run: npm run wpt:install-browsers

      - name: Build solution
        timeout-minutes: 15
        run: dotnet build Source/Broiler.HTML.slnx

      - name: Prepare WPT checkout
        timeout-minutes: 10
        run: npm run wpt:prepare -- --output "${RUNNER_TEMP}/wpt"

      - name: Run non-JS WPT subset
        # Reserve most of the job budget for the actual render/diff pass while
        # still failing a stuck batch well before the overall 45-minute cap.
        timeout-minutes: 20
        run: >
          npm run wpt:run -- --wpt-root "${RUNNER_TEMP}/wpt"
          --output "${RUNNER_TEMP}/wpt-artifacts"
          --include css/css-backgrounds
          --exclude css/css-backgrounds/animations/background-color-animation-with-images.html
          --exclude css/css-backgrounds/background-attachment-fixed-inside-transform-1.html
          --exclude css/css-backgrounds/background-attachment-fixed-border-radius-offset.html
          --exclude css/css-backgrounds/background-attachment-fixed.html
          --exclude css/css-backgrounds/background-attachment-350.html
          --exclude css/css-backgrounds/background-attachment-local.html
          --exclude css/css-backgrounds/background-attachment-local-hidden.html
          --exclude css/css-backgrounds/background-attachment-local-scrolling.htm
          --exclude css/css-backgrounds/background-attachment-margin-root-001.html
          --exclude css/css-backgrounds/background-attachment-margin-root-002.html
          --exclude css/css-backgrounds/background-334.html
          --exclude css/css-backgrounds/background-clip-002.html
          --exclude css/css-backgrounds/background-clip-003.html
          --exclude css/css-backgrounds/background-clip-004.html
          --exclude css/css-backgrounds/background-clip-005.html
          --exclude css/css-backgrounds/background-clip-006.html
          --exclude css/css-backgrounds/background-clip-007.html
          --exclude css/css-backgrounds/background-clip-008.html
          --exclude css/css-backgrounds/background-clip-009.html
          --exclude css/css-backgrounds/background-clip-010.html
          --exclude css/css-backgrounds/background-clip-color.html
          --exclude css/css-backgrounds/background-clip-content-box.html
          --exclude css/css-backgrounds/background-clip-content-box-001.html
          --exclude css/css-backgrounds/background-clip-content-box-002.html
          --exclude css/css-backgrounds/background-clip-content-box-with-border-radius-002.html
          --exclude css/css-backgrounds/background-clip-content-box-with-border-radius-003.html
          --exclude css/css-backgrounds/background-clip-padding-box-001.html
          --exclude css/css-backgrounds/background-clip-padding-box-with-border-radius.html
          --exclude css/css-backgrounds/background-clip-padding-box-with-border-radius-002.html
          --exclude css/css-backgrounds/background-clip-padding-box-with-border-radius-003.html
          --exclude css/css-backgrounds/background-clip_padding-box.html
          --exclude css/css-backgrounds/background_color_padding_box.htm
          --exclude css/css-backgrounds/background-clip/clip-border-area-border-image.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-border-shape-background-position.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-border-shape-overflow.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-border-shape.html
          --exclude css/css-backgrounds/background-clip/clip-border-box_with_position.html
          --exclude css/css-backgrounds/background-clip/clip-border-box_with_radius.html
          --exclude css/css-backgrounds/background-clip/clip-border-box_with_size.html
          --exclude css/css-backgrounds/background-clip/clip-border-box.html
          --exclude css/css-backgrounds/background-clip/clip-border-shape-table-part-background.html
          --exclude css/css-backgrounds/background-clip/clip-content-box.html
          --exclude css/css-backgrounds/background-clip/clip-content-box_with_radius.html
          --exclude css/css-backgrounds/background-clip/clip-content-box_with_position.html
          --exclude css/css-backgrounds/background-clip/clip-content-box_with_size.html
          --exclude css/css-backgrounds/background-clip/clip-padding-box.html
          --exclude css/css-backgrounds/background-clip/clip-padding-box_with_position.html
          --exclude css/css-backgrounds/background-clip/clip-padding-box_with_radius.html
          --exclude css/css-backgrounds/background-clip/clip-padding-box_with_size.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-box-decoration-break.html
          --exclude css/css-backgrounds/background-clip/clip-border-area.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-on-body-not-propagated-to-root.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-corner-shape.html
          --exclude css/css-backgrounds/background-clip/clip-border-area-text.html
          --exclude css/css-backgrounds/background-clip/clip-rounded-corner.html
          --exclude css/css-backgrounds/background-clip/clip-text-background-table-cell.html
          --exclude css/css-backgrounds/background-clip/clip-text-descendants.html
          --exclude css/css-backgrounds/background-clip/clip-text-ellipsis.html
          --exclude css/css-backgrounds/background-clip/clip-text-flex.html
          --exclude css/css-backgrounds/background-clip/clip-text-inline.html
          --exclude css/css-backgrounds/background-clip/clip-text-inline-block-child.html
          --exclude css/css-backgrounds/background-clip/clip-text-multi-line.html
          --exclude css/css-backgrounds/background-clip/clip-text-multiline-linebreak.html
          --exclude css/css-backgrounds/background-clip/clip-text-multiline-background-image.html
          --exclude css/css-backgrounds/background-clip/clip-text-out-of-flow-child.html
          --exclude css/css-backgrounds/background-clip/clip-text-stacking-context-child.html
          --exclude css/css-backgrounds/background-clip/clip-text-relative-child.html
          --exclude css/css-backgrounds/background-clip/clip-text-text-align.html
          --exclude css/css-backgrounds/background-clip/clip-text-text-decorations.html
          --exclude css/css-backgrounds/background-clip/clip-text-text-emphasis.html
          --exclude css/css-backgrounds/background-clip/clip-text-transform.html
          --exclude css/css-backgrounds/background-clip/clip-text-on-body-not-propagated-to-root.html
          --exclude css/css-backgrounds/background-clip/clip-text-scaled.html
          --exclude css/css-backgrounds/background-clip/clip-text-constrain-geometry.html
          --exclude css/css-backgrounds/background-clip/clip-text-fragmentation.html
          --exclude css/css-backgrounds/background-clip/clip-text-blend-mode.html
          --exclude css/css-backgrounds/background_properties_greater_than_images.htm
          --exclude css/css-backgrounds/background_repeat_space_border_box.htm
          --exclude css/css-backgrounds/background_repeat_space_content_box.htm
          --limit 20
          --width 800
          --height 600
          --exit-zero-on-differences

      - name: Add WPT summary to workflow summary
        if: always()
        timeout-minutes: 5
        run: |
          if [ -f "${RUNNER_TEMP}/wpt-artifacts/summary.md" ]; then
            cat "${RUNNER_TEMP}/wpt-artifacts/summary.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Flag visual discrepancies
        if: always()
        timeout-minutes: 5
        env:
          SUMMARY_JSON: ${{ runner.temp }}/wpt-artifacts/summary.json
        run: |
          node --input-type=module - <<'EOF'
          import { existsSync, readFileSync } from 'node:fs';

          const summaryPath = process.env.SUMMARY_JSON;
          if (!summaryPath || !existsSync(summaryPath)) {
            console.log('No WPT summary JSON was produced.');
            process.exit(0);
          }

          const summary = JSON.parse(readFileSync(summaryPath, 'utf8'));
          if (summary.failedCount > 0) {
            console.log(`::warning::${summary.failedCount} WPT case(s) differed from Chromium. See the uploaded workflow artifact for diffs.`);
          }
          EOF

      - name: Create triage issue for the most common WPT failure
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        env:
          SUMMARY_JSON: ${{ runner.temp }}/wpt-artifacts/summary.json
          # ISSUE_TOKEN should be a fine-grained PAT or GitHub App token with
          # Issues: Write permission on this repository. The script uses
          # it only to create a new issue for the most common WPT failure.
          ISSUE_TOKEN: ${{ secrets.ISSUE_TOKEN }}
        run: node ./scripts/wpt/report-common-failure-issue.mjs --example-limit 5

      - name: Upload WPT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        with:
          name: non-js-wpt-artifacts
          path: ${{ runner.temp }}/wpt-artifacts
          if-no-files-found: warn
