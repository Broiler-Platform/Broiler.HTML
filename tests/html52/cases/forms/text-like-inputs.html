<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  form { width: 520px; padding: 12px; border: 3px solid #495057; background: #f8f9fa; }
  label { display: block; margin: 8px 0; color: #212529; }
  input { width: 250px; height: 24px; margin-left: 12px; padding: 3px 6px; border: 2px solid #1971c2; background: #e7f5ff; }
</style>
<form>
  <label>Text <input type="text" value="alpha"></label>
  <label>Search <input type="search" value="query"></label>
  <label>Email <input type="email" value="a@example.test"></label>
  <label>URL <input type="url" value="https://example.test/"></label>
  <label>Tel <input type="tel" value="12345"></label>
  <label>Password <input type="password" value="secret"></label>
</form>
