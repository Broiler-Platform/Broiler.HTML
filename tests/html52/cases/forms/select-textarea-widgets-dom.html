<form id="widgets">
  <select id="fruit" name="fruit">
    <optgroup label="Fruit">
      <option value="apple" selected>Apple</option>
      <option value="pear">Pear</option>
    </optgroup>
    <optgroup label="Vegetables">
      <option value="carrot">Carrot</option>
    </optgroup>
  </select>
  <select id="letters" name="letters" multiple size="2">
    <option selected>A</option>
    <option>B</option>
  </select>
  <datalist id="colors">
    <option value="red">
    <option value="green">
  </datalist>
  <textarea name="notes" rows="3" cols="16">Line one
Line two</textarea>
  <progress value="3" max="10">30%</progress>
  <meter min="0" low="30" high="70" optimum="80" max="100" value="65">65</meter>
</form>
