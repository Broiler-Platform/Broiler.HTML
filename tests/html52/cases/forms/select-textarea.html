<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  form { width: 520px; padding: 14px; border: 3px solid #495057; background: #f8f9fa; }
  select, textarea { display: inline-block; margin: 8px; border: 2px solid #1971c2; background: #e7f5ff; vertical-align: top; }
  select { width: 150px; height: 32px; }
  select[multiple] { height: 70px; background: #d3f9d8; }
  textarea { width: 180px; height: 70px; padding: 6px; }
</style>
<form>
  <select name="fruit">
    <option value="apple" selected>Apple</option>
    <option value="pear">Pear</option>
  </select>
  <select name="letters" multiple size="2">
    <option selected>A</option>
    <option>B</option>
  </select>
  <textarea name="notes">Line one
Line two</textarea>
</form>
