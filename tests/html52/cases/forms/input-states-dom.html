<form id="states">
  <input type="hidden" name="token" value="secret">
  <input type="text" name="text" value="alpha">
  <input type="search" name="search" value="query">
  <input type="tel" name="tel" value="12345">
  <input type="url" name="url" value="https://example.test/">
  <input type="email" name="email" value="a@example.test">
  <input type="password" name="password" value="hidden">
  <input type="date" name="date" value="2026-06-20">
  <input type="month" name="month" value="2026-06">
  <input type="week" name="week" value="2026-W25">
  <input type="time" name="time" value="12:34">
  <input type="datetime-local" name="datetime" value="2026-06-20T12:34">
  <input type="number" name="number" min="1" max="9" step="2" value="5">
  <input type="range" name="range" min="0" max="100" step="10" value="40">
  <input type="color" name="color" value="#2f9e44">
  <input type="checkbox" name="check" checked>
  <input type="radio" name="choice" value="a" checked>
  <input type="file" name="upload" multiple>
  <input type="submit" name="submit" value="Send">
  <input type="image" name="image" src="../../assets/svg/green-square.svg" alt="Image submit">
  <input type="reset" name="reset" value="Clear">
  <input type="button" name="button" value="Plain">
  <input name="default-text" value="Default type">
</form>
