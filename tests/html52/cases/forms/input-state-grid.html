<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  form { width: 720px; padding: 12px; border: 3px solid #343a40; background: #f1f3f5; }
  label { display: inline-block; width: 225px; height: 34px; margin: 5px; vertical-align: top; }
  input { width: 110px; height: 22px; padding: 2px 4px; border: 2px solid #495057; background: #ffffff; }
  input[type="checkbox"], input[type="radio"] { width: 18px; min-width: 18px; }
  input[type="range"] { border: 0; background: #91a7ff; }
  input[type="color"] { width: 38px; background: #2f9e44; }
  input[type="submit"], input[type="reset"], input[type="button"] { width: 70px; background: #ffd43b; }
  input[type="file"] { width: 120px; background: #fff3bf; }
</style>
<form>
  <input type="hidden" name="token" value="secret">
  <label>text <input type="text" value="text"></label>
  <label>search <input type="search" value="search"></label>
  <label>tel <input type="tel" value="12345"></label>
  <label>url <input type="url" value="url"></label>
  <label>email <input type="email" value="mail"></label>
  <label>password <input type="password" value="pass"></label>
  <label>date <input type="date" value="2026-06-20"></label>
  <label>month <input type="month" value="2026-06"></label>
  <label>week <input type="week" value="2026-W25"></label>
  <label>time <input type="time" value="12:34"></label>
  <label>datetime <input type="datetime-local" value="2026-06-20T12:34"></label>
  <label>number <input type="number" value="5"></label>
  <label>range <input type="range" value="40"></label>
  <label>color <input type="color" value="#2f9e44"></label>
  <label>checkbox <input type="checkbox" checked></label>
  <label>radio <input type="radio" checked></label>
  <label>file <input type="file"></label>
  <label>submit <input type="submit" value="Go"></label>
  <label>image <input type="image" src="../../assets/svg/green-square.svg" alt="img"></label>
  <label>reset <input type="reset" value="Clear"></label>
  <label>button <input type="button" value="Plain"></label>
</form>
