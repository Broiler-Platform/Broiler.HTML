<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  form { width: 420px; padding: 12px; border: 3px solid #495057; background: #f8f9fa; }
  label { display: block; margin: 10px 0; }
  input[type="checkbox"], input[type="radio"] { width: 18px; height: 18px; min-width: 18px; margin-right: 10px; border: 3px solid #343a40; background: #ffffff; }
  input[checked] { background: #51cf66; }
  input[type="radio"] { border-radius: 9px; }
</style>
<form>
  <label><input type="checkbox" checked> Checked checkbox</label>
  <label><input type="checkbox"> Empty checkbox</label>
  <label><input type="radio" name="pick" checked> Selected radio</label>
  <label><input type="radio" name="pick"> Empty radio</label>
</form>
