<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  table { border-collapse: collapse; border: 3px solid #343a40; }
  td { width: 110px; height: 74px; padding: 4px; border: 2px solid #495057; background: #e7f5ff; }
  .left { text-align: left; vertical-align: top; }
  .center { text-align: center; vertical-align: middle; background: #fff3bf; }
  .right { text-align: right; vertical-align: bottom; background: #d3f9d8; }
</style>
<table>
  <tr>
    <td class="left">top left</td>
    <td class="center">middle</td>
    <td class="right">bottom right</td>
  </tr>
</table>
