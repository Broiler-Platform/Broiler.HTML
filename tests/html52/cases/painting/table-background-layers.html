<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  table { border-collapse: separate; border-spacing: 6px; background: #343a40; border: 4px solid #212529; }
  tbody { background: #ffe3e3; }
  tr { background: #fff3bf; }
  td { width: 90px; height: 42px; padding: 6px; border: 3px solid #1971c2; background: #d0ebff; }
  td.empty { background: transparent; }
</style>
<table>
  <tbody>
    <tr><td>A</td><td class="empty"></td></tr>
    <tr><td class="empty"></td><td>B</td></tr>
  </tbody>
</table>
