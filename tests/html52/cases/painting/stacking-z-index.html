<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; }
  .stage { position: relative; width: 280px; height: 170px; border: 4px solid #343a40; background: #f8f9fa; }
  .box { position: absolute; width: 130px; height: 90px; border: 3px solid #212529; }
  .red { left: 30px; top: 30px; background: #ff6b6b; z-index: 1; }
  .blue { left: 90px; top: 60px; background: #4dabf7; z-index: 3; }
  .green { left: 145px; top: 25px; background: #69db7c; z-index: 2; }
</style>
<div class="stage">
  <div class="box red"></div>
  <div class="box blue"></div>
  <div class="box green"></div>
</div>
