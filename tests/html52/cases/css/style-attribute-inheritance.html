<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  .panel { width: 450px; padding: 12px; border: 3px solid #343a40; background: #f8f9fa; }
  .box { display: inline-block; width: 140px; height: 42px; margin: 6px; border: 3px solid #495057; background: #dbe4ff; color: #1971c2; line-height: 42px; text-align: center; }
  .box strong { color: inherit; }
</style>
<div class="panel">
  <span class="box" style="background: #d3f9d8; color: #2b8a3e;">inline style</span>
  <span class="box"><strong>inherited</strong></span>
</div>
