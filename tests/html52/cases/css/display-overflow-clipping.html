<!doctype html>
<style>
  body { margin: 20px; background: #ffffff; font-family: Arial, sans-serif; }
  .clip { width: 240px; height: 82px; padding: 10px; border: 4px solid #343a40; overflow: hidden; background: #e7f5ff; }
  .hidden { display: none; }
  .wide { display: inline-block; width: 360px; height: 44px; background: #ffd43b; border: 3px solid #e67700; }
  .block { margin-top: 8px; width: 120px; height: 24px; background: #69db7c; }
</style>
<div class="clip">
  <span class="wide">wide inline-block clipped at the edge</span>
  <span class="hidden">hidden text</span>
  <div class="block"></div>
</div>
